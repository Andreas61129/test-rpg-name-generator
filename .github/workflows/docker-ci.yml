name: Build and Push Docker Image

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      # 1. New step: Add QEMU to support multi-platform builds
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # 2. Updated step: Bumped to @v4 as shown in the image
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        
      - name: Extract Docker image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ vars.DOCKER_USERNAME }}/my-image

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKER_USERNAME }} # variable
          password: ${{ secrets.DOCKER_PASSWORD }} # secret

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          annotations: ${{ steps.meta.outputs.annotations }} 
          provenance: true
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # 3. New parameter: Specify target platforms
          platforms: linux/amd64,linux/arm64

      # New Step: Docker Scout für CVE-Scans after build
      - name: Docker Scout CVEs
        uses: docker/scout-action@v1
        with:
          command: cves
          image: ${{ steps.meta.outputs.tags }}
          sarif-file: scout-report.sarif
